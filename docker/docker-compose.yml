services:
  postgres:
    image: postgres:16
    container_name: giftkeeper-postgres
    environment:
      POSTGRES_DB: giftkeeper
      POSTGRES_USER: giftkeeper
      POSTGRES_PASSWORD: giftkeeper
    ports:
      - "5432:5432"
    volumes:
      - giftkeeper_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giftkeeper -d giftkeeper"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  giftkeeper_pgdata:
