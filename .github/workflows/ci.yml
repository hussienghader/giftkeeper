name: GiftKeeper CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build and Test
        run: mvn clean verify

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn sonar:sonar
          -Dsonar.projectKey=hussienghader_giftkeeper
          -Dsonar.organization=hussienghader
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.token=${SONAR_TOKEN}
          -Dsonar.coverage.exclusions=**/*Main.java,**/*Application.java,**/*Module.java,**/*UseCases.java,**/*Repository.java,**/*Catalog.java,**/giftkeeper-persistence-api/src/main/java/**/*.java,**/giftkeeper-bdd/src/main/java/**/*.java,**/giftkeeper-e2e/src/main/java/**/*.java
