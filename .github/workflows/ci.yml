name: GiftKeeper CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

      - name: SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B sonar:sonar
          -Dsonar.projectKey=hussienghader_giftkeeper
          -Dsonar.projectName="GiftKeeper Parent"
          -Dsonar.organization=hussienghader
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.token=${SONAR_TOKEN}
          -Dsonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml
          -Dsonar.exclusions=**/target/**,**/.git/**,**/.mvn/**,giftkeeper-persistence-api/**,giftkeeper-bdd/src/main/java/**,giftkeeper-e2e/src/main/java/**
          -Dsonar.coverage.exclusions=**/*Main.java,**/*Application.java,**/*Module.java,**/*UseCases.java,**/*Repository.java,**/*Catalog.java,**/JpaPersistence.java,giftkeeper-persistence-api/**,giftkeeper-bdd/**,giftkeeper-e2e/**
          -Dsonar.cpd.exclusions=**/src/test/**,giftkeeper-bdd/**,giftkeeper-e2e/**
