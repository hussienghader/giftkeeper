name: GiftKeeper CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build, test, and generate JaCoCo XML reports
        run: mvn -B clean verify

      - name: Show generated JaCoCo XML reports
        run: |
          find "$GITHUB_WORKSPACE" -path "*/target/site/jacoco/jacoco.xml" -print

      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.projectKey=hussienghader_giftkeeper \
            -Dsonar.projectName=GiftKeeper \
            -Dsonar.organization=hussienghader \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.coverage.jacoco.xmlReportPaths="${GITHUB_WORKSPACE}/giftkeeper-domain/target/site/jacoco/jacoco.xml,${GITHUB_WORKSPACE}/giftkeeper-app/target/site/jacoco/jacoco.xml,${GITHUB_WORKSPACE}/giftkeeper-persistence-jpa/target/site/jacoco/jacoco.xml,${GITHUB_WORKSPACE}/giftkeeper-gui/target/site/jacoco/jacoco.xml,${GITHUB_WORKSPACE}/giftkeeper-cli/target/site/jacoco/jacoco.xml" \
            -Dsonar.exclusions="**/target/**,**/.git/**,**/.mvn/**,giftkeeper-persistence-api/**,giftkeeper-bdd/**,giftkeeper-e2e/**" \
            -Dsonar.coverage.exclusions="**/*Main.java,**/*Application.java,**/*Module.java,**/*UseCases.java,**/*Repository.java,**/*Catalog.java,giftkeeper-gui/**,giftkeeper-cli/src/main/java/com/giftkeeper/cli/GiftKeeperCliMain.java,giftkeeper-app/src/main/java/com/giftkeeper/app/GiftKeeperApplication.java,giftkeeper-app/src/main/java/com/giftkeeper/app/GiftKeeperInMemoryModule.java,giftkeeper-app/src/main/java/com/giftkeeper/app/GiftKeeperJpaModule.java,giftkeeper-app/src/main/java/com/giftkeeper/app/GiftKeeperUseCases.java,giftkeeper-app/src/main/java/com/giftkeeper/app/GiftSuggestionCatalog.java,giftkeeper-app/src/main/java/com/giftkeeper/app/RuleBasedGiftSuggestionCatalog.java,giftkeeper-persistence-api/**,giftkeeper-bdd/**,giftkeeper-e2e/**" \
            -Dsonar.cpd.exclusions="**/src/test/**,giftkeeper-bdd/**,giftkeeper-e2e/**" \
            -Dsonar.issue.ignore.multicriteria="e1,e2,e3,e4,e5" \
            -Dsonar.issue.ignore.multicriteria.e1.ruleKey="java:S5778" \
            -Dsonar.issue.ignore.multicriteria.e1.resourceKey="**/src/test/java/**/*" \
            -Dsonar.issue.ignore.multicriteria.e2.ruleKey="java:S5785" \
            -Dsonar.issue.ignore.multicriteria.e2.resourceKey="**/src/test/java/**/*" \
            -Dsonar.issue.ignore.multicriteria.e3.ruleKey="java:S6068" \
            -Dsonar.issue.ignore.multicriteria.e3.resourceKey="**/src/test/java/**/*" \
            -Dsonar.issue.ignore.multicriteria.e4.ruleKey="java:S5845" \
            -Dsonar.issue.ignore.multicriteria.e4.resourceKey="**/src/test/java/**/*" \
            -Dsonar.issue.ignore.multicriteria.e5.ruleKey="java:S106" \
            -Dsonar.issue.ignore.multicriteria.e5.resourceKey="giftkeeper-cli/src/main/java/com/giftkeeper/cli/GiftKeeperCliMain.java"
