name: GiftKeeper CI

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-quality:
    name: Build, test, coverage, mutation and quality
    runs-on: ubuntu-latest

    env:
      MAVEN_OPTS: -Dfile.encoding=UTF-8
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Install Xvfb for Swing GUI tests
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Verify Docker availability for Testcontainers
        run: docker version

      - name: Full verification including tests, coverage and PIT
        run: |
          chmod +x scripts/verify-local.sh
          Xvfb :99 -screen 0 1920x1080x24 &
          export DISPLAY=:99
          ./scripts/verify-local.sh

      - name: SonarCloud analysis
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.projectKey=${{ github.repository_owner }}_giftkeeper \
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ env.SONAR_TOKEN }}

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: giftkeeper-verification-reports
          path: |
            **/target/surefire-reports/**
            **/target/site/jacoco/**
            **/target/pit-reports/**
