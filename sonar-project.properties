sonar.host.url=https://sonarcloud.io

sonar.sources=giftkeeper-domain/src/main/java,giftkeeper-persistence-api/src/main/java,giftkeeper-persistence-jpa/src/main/java,giftkeeper-app/src/main/java,giftkeeper-gui/src/main/java,giftkeeper-cli/src/main/java
sonar.tests=giftkeeper-domain/src/test/java,giftkeeper-persistence-jpa/src/test/java,giftkeeper-app/src/test/java,giftkeeper-gui/src/test/java,giftkeeper-cli/src/test/java,giftkeeper-bdd/src/test/java,giftkeeper-e2e/src/test/java
