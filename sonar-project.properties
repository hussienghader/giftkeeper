# SonarCloud configuration for the academic GiftKeeper project.
sonar.projectKey=hussienghader_giftkeeper
sonar.projectName=GiftKeeper
sonar.organization=hussienghader
sonar.host.url=https://sonarcloud.io
sonar.java.source=17

# Use the XML reports generated by each Maven module after `mvn clean verify`.
sonar.coverage.jacoco.xmlReportPaths=giftkeeper-domain/target/site/jacoco/jacoco.xml,giftkeeper-app/target/site/jacoco/jacoco.xml,giftkeeper-persistence-jpa/target/site/jacoco/jacoco.xml,giftkeeper-gui/target/site/jacoco/jacoco.xml,giftkeeper-cli/target/site/jacoco/jacoco.xml

# Exclude non-business orchestration modules from static analysis noise.
sonar.exclusions=**/target/**,**/.git/**,**/.mvn/**,giftkeeper-persistence-api/**,giftkeeper-bdd/**,giftkeeper-e2e/**,giftkeeper-cli/src/main/java/com/giftkeeper/cli/GiftKeeperCliMain.java

# Coverage is measured on executable production/business code.
# Launchers, DI modules, ports/interfaces, BDD/E2E wrappers and pure catalogs are tested, but excluded from the coverage denominator.
sonar.coverage.exclusions=giftkeeper-gui/**,**/*Main.java,**/*Application.java,**/*Module.java,**/*UseCases.java,**/*Repository.java,**/*Catalog.java,giftkeeper-cli/src/main/java/com/giftkeeper/cli/GiftKeeperCliMain.java,giftkeeper-gui/src/main/java/com/giftkeeper/gui/GiftKeeperGuiMain.java,giftkeeper-app/src/main/java/com/giftkeeper/app/GiftKeeperApplication.java,giftkeeper-app/src/main/java/com/giftkeeper/app/GiftKeeperInMemoryModule.java,giftkeeper-app/src/main/java/com/giftkeeper/app/GiftKeeperJpaModule.java,giftkeeper-app/src/main/java/com/giftkeeper/app/GiftKeeperUseCases.java,giftkeeper-app/src/main/java/com/giftkeeper/app/GiftSuggestionCatalog.java,giftkeeper-app/src/main/java/com/giftkeeper/app/RuleBasedGiftSuggestionCatalog.java,giftkeeper-persistence-api/**,giftkeeper-bdd/**,giftkeeper-e2e/**
sonar.cpd.exclusions=**/src/test/**,giftkeeper-bdd/**,giftkeeper-e2e/**

# Test code intentionally contains exception assertions and Mockito interaction checks.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S5778
sonar.issue.ignore.multicriteria.e1.resourceKey=**/src/test/java/**/*
sonar.issue.ignore.multicriteria.e2.ruleKey=java:S5785
sonar.issue.ignore.multicriteria.e2.resourceKey=**/src/test/java/**/*
sonar.issue.ignore.multicriteria.e3.ruleKey=java:S6068
sonar.issue.ignore.multicriteria.e3.resourceKey=**/src/test/java/**/*
sonar.issue.ignore.multicriteria.e4.ruleKey=java:S5845
sonar.issue.ignore.multicriteria.e4.resourceKey=**/src/test/java/**/*
sonar.issue.ignore.multicriteria.e5.ruleKey=java:S106
sonar.issue.ignore.multicriteria.e5.resourceKey=giftkeeper-cli/src/main/java/com/giftkeeper/cli/GiftKeeperCliMain.java

sonar.issue.ignore.multicriteria.e6.ruleKey=java:S5853
sonar.issue.ignore.multicriteria.e6.resourceKey=**/src/test/java/**/*
