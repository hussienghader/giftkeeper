# SonarCloud configuration for the academic GiftKeeper project.
sonar.projectKey=hussienghader_giftkeeper
sonar.projectName=GiftKeeper
sonar.organization=hussienghader
sonar.host.url=https://sonarcloud.io

# Analyze only the production modules that contain executable application/business code.
# Pure API, BDD runner, and E2E orchestration modules are still built and tested by Maven,
# but they are excluded from Sonar coverage because they do not contain business logic.
sonar.sources=giftkeeper-domain/src/main/java,giftkeeper-persistence-jpa/src/main/java,giftkeeper-app/src/main/java,giftkeeper-gui/src/main/java,giftkeeper-cli/src/main/java
sonar.tests=giftkeeper-domain/src/test/java,giftkeeper-persistence-jpa/src/test/java,giftkeeper-app/src/test/java,giftkeeper-gui/src/test/java,giftkeeper-cli/src/test/java,giftkeeper-bdd/src/test/java,giftkeeper-e2e/src/test/java
sonar.java.source=17
sonar.coverage.jacoco.xmlReportPaths=giftkeeper-domain/target/site/jacoco/jacoco.xml,giftkeeper-persistence-jpa/target/site/jacoco/jacoco.xml,giftkeeper-app/target/site/jacoco/jacoco.xml,giftkeeper-gui/target/site/jacoco/jacoco.xml,giftkeeper-cli/target/site/jacoco/jacoco.xml

sonar.exclusions=**/target/**,**/.mvn/**,**/.git/**,giftkeeper-persistence-api/**,giftkeeper-bdd/src/main/java/**,giftkeeper-e2e/src/main/java/**
sonar.coverage.exclusions=**/*Main.java,**/*Application.java,**/*Module.java,**/*UseCases.java,**/JpaPersistence.java,giftkeeper-persistence-api/**,giftkeeper-bdd/**,giftkeeper-e2e/**
sonar.cpd.exclusions=**/src/test/**,giftkeeper-bdd/**,giftkeeper-e2e/**

# Test code intentionally contains exception assertions and Mockito interaction checks.
# These rules are useful in production code, but they add noise to deliberate unit-test patterns.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S5778
sonar.issue.ignore.multicriteria.e1.resourceKey=**/src/test/java/**/*
sonar.issue.ignore.multicriteria.e2.ruleKey=java:S5785
sonar.issue.ignore.multicriteria.e2.resourceKey=**/src/test/java/**/*
sonar.issue.ignore.multicriteria.e3.ruleKey=java:S6068
sonar.issue.ignore.multicriteria.e3.resourceKey=**/src/test/java/**/*
sonar.issue.ignore.multicriteria.e4.ruleKey=java:S5845
sonar.issue.ignore.multicriteria.e4.resourceKey=**/src/test/java/**/*
