# SonarCloud configuration for GiftKeeper.
sonar.projectKey=hussienghader_giftkeeper
sonar.projectName=GiftKeeper Parent
sonar.organization=hussienghader
sonar.host.url=https://sonarcloud.io
sonar.java.source=17

# JaCoCo XML reports generated by Maven in each tested module.
sonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml

# Keep analysis focused on code that matters for the course project.
sonar.exclusions=**/target/**,**/.git/**,**/.mvn/**,giftkeeper-persistence-api/**,giftkeeper-bdd/src/main/java/**,giftkeeper-e2e/src/main/java/**

# Coverage is measured on executable business/infrastructure code only.
# Bootstrap launchers, DI modules, interfaces/ports and orchestration-only modules are excluded.
sonar.coverage.exclusions=**/*Main.java,**/*Application.java,**/*Module.java,**/*UseCases.java,**/*Repository.java,**/*Catalog.java,**/JpaPersistence.java,giftkeeper-persistence-api/**,giftkeeper-bdd/**,giftkeeper-e2e/**
sonar.cpd.exclusions=**/src/test/**,giftkeeper-bdd/**,giftkeeper-e2e/**

# Test code intentionally uses exception assertions and direct Mockito interaction checks.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S5778
sonar.issue.ignore.multicriteria.e1.resourceKey=**/src/test/java/**/*
sonar.issue.ignore.multicriteria.e2.ruleKey=java:S5785
sonar.issue.ignore.multicriteria.e2.resourceKey=**/src/test/java/**/*
sonar.issue.ignore.multicriteria.e3.ruleKey=java:S6068
sonar.issue.ignore.multicriteria.e3.resourceKey=**/src/test/java/**/*
sonar.issue.ignore.multicriteria.e4.ruleKey=java:S5845
sonar.issue.ignore.multicriteria.e4.resourceKey=**/src/test/java/**/*
