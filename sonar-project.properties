# Generated files, wrappers, entry points and pure module/API markers are excluded from coverage/analysis noise.
sonar.exclusions=**/target/**,**/.mvn/**,**/.git/**
sonar.coverage.exclusions=**/*Main.java,**/*Application.java,**/*Module.java,**/*UseCases.java,**/*Repository.java,**/*Catalog.java,**/giftkeeper-persistence-api/src/main/java/**/*.java,**/giftkeeper-bdd/src/main/java/**/*.java,**/giftkeeper-e2e/src/main/java/**/*.java
sonar.cpd.exclusions=**/src/test/**

# Test code intentionally contains exception assertions and Mockito interaction checks.
# These rules are useful in production code, but they add noise to deliberate unit-test patterns.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
